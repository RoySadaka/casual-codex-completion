# Copy this file to `.local/config.toml` for local development if needed.
# The launch scripts create that file automatically on first run.

codex_cli_path = "/Applications/Codex.app/Contents/Resources/codex"
model = "gpt-5.5"
# Optional overrides:
# reasoning_effort = "medium"
# user_name = "Your Name"
# prompt_prefix_char_limit = 4096
# CCC Chronicle keeps a local bounded memory snapshot from recent interactions.
# memory_enabled = true
# memory_activity_limit = 80
# memory_prompt_char_limit = 6000
# Native Codex compaction is lightweight now because CCC keeps the main thread text-only.
# compaction_invocation_interval = 10
dev_mode = false
